<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AtlasQuest – Challenge</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; height: 100vh; height: 100dvh; display: flex; flex-direction: column; }
    * { -webkit-tap-highlight-color: transparent; }
    button { touch-action: manipulation; }

    /* ── Header ── */
    #header {
      padding: 10px 20px;
      background: rgba(0,0,0,0.55);
      border-bottom: 1px solid #333;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #brand-link {
      font-size: 1rem;
      letter-spacing: 2px;
      color: #888;
      text-decoration: none;
      white-space: nowrap;
    }
    #brand-link span { color: #f5c842; font-weight: 700; letter-spacing: 3px; }
    #brand-link:hover { color: #bbb; }
    #challenge-badge {
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: #7effa0;
      text-transform: uppercase;
      font-weight: 700;
      border: 1px solid #7effa0;
      border-radius: 6px;
      padding: 3px 8px;
      opacity: 0.8;
    }

    /* ── Quiz prompt bar ── */
    #quiz-bar {
      padding: 8px 20px;
      background: rgba(0,0,0,0.4);
      border-bottom: 1px solid #2a2a4a;
      text-align: center;
      flex-shrink: 0;
    }
    #prompt-box {
      display: inline-block;
      background: rgba(245,200,66,0.1);
      border: 1.5px solid #f5c842;
      border-radius: 10px;
      padding: 6px 28px;
    }
    #prompt-label { font-size: 0.65rem; color: #aaa; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 1px; }
    #city-prompt  { font-size: 1.5rem; font-weight: 700; color: #f5c842; letter-spacing: 2px; }
    #progress { margin-top: 6px; font-size: 0.75rem; color: #666; }
    #progress span { color: #bbb; font-weight: bold; }

    #map { flex: 1; cursor: crosshair; }

    /* ── Feedback ── */
    #feedback-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      z-index: 8000;
      pointer-events: none;
    }
    #feedback-banner {
      display: none;
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: #1a1a2e;
      border-radius: 14px;
      padding: 20px 36px;
      text-align: center;
      min-width: 290px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
      border: 2px solid #f5c842;
    }
    #feedback-result { font-size: 1.4rem; font-weight: bold; margin-bottom: 6px; color: #f5c842; }
    #feedback-grade {
      font-size: 2.8rem; font-weight: 800; line-height: 1;
      margin-bottom: 6px; letter-spacing: 1px;
    }
    .score-great { color: #7effa0; }
    .score-good  { color: #b8f542; }
    .score-ok    { color: #f5c842; }
    .score-poor  { color: #ff9a3c; }
    .score-bad   { color: #ff6b6b; }
    #feedback-detail { font-size: 0.95rem; color: #bbb; margin-bottom: 16px; }
    #feedback-btns { display: flex; gap: 10px; justify-content: center; }
    #next-btn {
      background: #f5c842; color: #1a1a2e; border: none; border-radius: 8px;
      padding: 12px 30px; font-size: 1rem; font-weight: bold; cursor: pointer;
      letter-spacing: 1px; pointer-events: all;
    }
    #next-btn:hover { background: #ffe066; }
    #inspect-btn {
      background: transparent; color: #aaa; border: 1px solid #555; border-radius: 8px;
      padding: 12px 20px; font-size: 1rem; font-weight: bold; cursor: pointer;
      letter-spacing: 1px; pointer-events: all;
    }
    #inspect-btn:hover { color: #fff; border-color: #aaa; }
    #feedback-banner.inspect-mode {
      padding: 10px 16px; min-width: 0; bottom: 20px;
      left: auto; right: 20px; transform: none;
      display: flex; align-items: center; gap: 10px;
    }
    #feedback-banner.inspect-mode #feedback-result,
    #feedback-banner.inspect-mode #feedback-detail,
    #feedback-banner.inspect-mode #inspect-btn { display: none; }
    #feedback-banner.inspect-mode #feedback-grade { font-size: 1.6rem; margin: 0; }
    #feedback-banner.inspect-mode #feedback-btns { margin: 0; }
    #feedback-banner.inspect-mode #next-btn { padding: 8px 18px; font-size: 0.9rem; }

    /* ── Confirm banner ── */
    #confirm-banner {
      display: none;
      position: fixed;
      bottom: 30px; left: 50%; transform: translateX(-50%);
      z-index: 9999;
      background: #1a1a2e;
      border: 2px solid #60b4ff;
      border-radius: 14px;
      padding: 20px 36px;
      text-align: center; min-width: 290px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
      pointer-events: all;
    }
    #confirm-question { font-size: 1.3rem; font-weight: bold; color: #60b4ff; margin-bottom: 16px; }
    #confirm-btns { display: flex; gap: 12px; justify-content: center; }
    #confirm-back-btn {
      background: transparent; border: 1.5px solid #555; border-radius: 8px;
      color: #999; padding: 11px 26px; font-size: 1rem; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    #confirm-back-btn:hover { border-color: #aaa; color: #ccc; }
    #confirm-yes-btn {
      background: #60b4ff; border: none; border-radius: 8px;
      color: #1a1a2e; padding: 11px 26px; font-size: 1rem;
      font-weight: bold; cursor: pointer; font-family: inherit;
    }
    #confirm-yes-btn:hover { background: #88caff; }

    /* ── Distance label marker wrapper ── */
    .quiz-dist-label { background: transparent !important; border: none !important; overflow: visible; }

    /* ── Stars ── */
    .star-wrap { font-size: 22px; line-height: 1; user-select: none; display: inline-block; }
    .s-answer { color: #7effa0; filter: drop-shadow(0 0 10px rgba(126,255,160,1)); animation: pulse 0.6s ease-in-out infinite alternate; }
    @keyframes pulse {
      from { filter: drop-shadow(0 0 6px rgba(126,255,160,0.6)); }
      to   { filter: drop-shadow(0 0 18px rgba(126,255,160,1)); }
    }

    /* ── End screen ── */
    #end-screen {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 10000;
      background: rgba(10,10,30,0.96);
      align-items: flex-start;
      justify-content: center;
      flex-direction: column;
      overflow-y: auto;
      padding: 0 16px;
    }
    #end-inner {
      display: flex; flex-direction: column; align-items: center;
      gap: 16px; text-align: center;
      width: 100%; max-width: 420px;
      margin: auto; padding: 36px 0;
    }
    #end-screen h2 { font-size: 1.8rem; color: #7effa0; letter-spacing: 2px; }
    #end-label { font-size: 0.8rem; letter-spacing: 3px; color: #555; text-transform: uppercase; margin-bottom: -4px; }
    #end-grade {
      font-size: 5rem; font-weight: 800; line-height: 1; letter-spacing: 2px;
    }
    #end-grade.score-great { color: #7effa0; }
    #end-grade.score-good  { color: #b8f542; }
    #end-grade.score-ok    { color: #f5c842; }
    #end-grade.score-poor  { color: #ff9a3c; }
    #end-grade.score-bad   { color: #ff6b6b; }
    #end-dist { font-size: 0.9rem; color: #888; letter-spacing: 1px; }
    #end-message { font-size: 1rem; color: #ccc; }
    #end-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }
    #practice-btn {
      display: inline-block;
      background: transparent; color: #aaa; border: 1px solid #555; border-radius: 8px;
      padding: 13px 28px; font-size: 1rem; font-weight: bold; cursor: pointer;
      letter-spacing: 0.5px; text-decoration: none; font-family: inherit;
    }
    #practice-btn:hover { color: #fff; border-color: #aaa; }
    #share-btn {
      background: #f5c842; color: #1a1a2e; border: none; border-radius: 8px;
      padding: 13px 22px; font-size: 1rem; font-weight: bold; cursor: pointer;
      letter-spacing: 0.5px; font-family: inherit;
    }
    #share-btn:hover { background: #ffe066; }
    #share-info {
      display: none;
      font-size: 0.8rem; color: #666; letter-spacing: 0.5px;
      padding: 10px 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      margin-top: -4px;
    }

    #tomorrow-note {
      font-size: 0.75rem;
      color: #444;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    /* ── Leaflet tile seam fix ── */
    .leaflet-tile-pane { -webkit-transform: translateZ(0); transform: translateZ(0); }
    .leaflet-tile { box-shadow: none !important; outline: 1px solid transparent !important; }

    /* Leaflet popup */
    .leaflet-popup-content-wrapper {
      background: #1a1a2e; border: 1.5px solid #f5c842; border-radius: 8px;
      color: #f5c842; font-size: 0.95rem; font-weight: bold;
      letter-spacing: 1px; box-shadow: 0 0 14px rgba(245,200,66,0.3);
    }
    .leaflet-popup-tip { background: #f5c842; }
    .leaflet-popup-close-button { display: none; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      #header { padding: 8px 12px; }
      #quiz-bar { padding: 8px 12px; }
      #city-prompt { font-size: 1.3rem; }
      #feedback-banner, #confirm-banner {
        width: calc(100% - 32px); min-width: unset; padding: 14px 16px;
        bottom: calc(16px + env(safe-area-inset-bottom, 0px));
      }
      #next-btn { padding: 11px 28px; font-size: 0.95rem; }
      #end-screen h2 { font-size: 1.4rem; }
      #end-grade { font-size: 4rem; }
      #end-btns { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>

<div id="header">
  <a id="brand-link" href="index.html"><span>AtlasQuest</span></a>
  <div id="challenge-badge">Challenge</div>
</div>

<div id="quiz-bar">
  <div id="prompt-box">
    <div id="prompt-label">Tap the map to place your guess</div>
    <div id="city-prompt">—</div>
  </div>
  <div id="progress">City <span id="q-num">1</span> of <span id="q-total">5</span></div>
</div>

<div id="map"></div>

<div id="confirm-banner">
  <div id="confirm-question">Final Answer?</div>
  <div id="confirm-btns">
    <button id="confirm-back-btn">← Back</button>
    <button id="confirm-yes-btn">Yes ✓</button>
  </div>
</div>

<div id="feedback-overlay"></div>
<div id="feedback-banner">
  <div id="feedback-result"></div>
  <div id="feedback-grade"></div>
  <div id="feedback-detail"></div>
  <div id="feedback-btns">
    <button id="inspect-btn">Inspect</button>
    <button id="next-btn">Next &rarr;</button>
  </div>
</div>

<div id="end-screen">
  <div id="end-inner">
    <h2>Challenge Complete!</h2>
    <div id="end-label">Your Score</div>
    <div id="end-grade"></div>
    <div id="end-dist"></div>
    <div id="end-message"></div>
    <div id="end-btns">
      <a href="practice.html" id="practice-btn">Practice Mode</a>
      <button id="share-btn">Share with Friends</button>
    </div>
    <div id="share-info"></div>
    <div id="tomorrow-note">New challenge available tomorrow!</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="cities.js"></script>
<script>
// ── City data ──
// ── Haversine distance in miles ──
function haversineMiles(lat1, lng1, lat2, lng2) {
  const R = 3958.8;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function distScore(dist) {
  return Math.max(0, Math.round(100 * Math.exp(-0.000348 * dist)));
}

function scoreClass(s) {
  if (s >= 90) return 'score-great';
  if (s >= 70) return 'score-good';
  if (s >= 50) return 'score-ok';
  if (s >= 30) return 'score-poor';
  return 'score-bad';
}

// ── Seeded PRNG (mulberry32) ──
// Same seed → same sequence on every device, enabling a shared daily challenge.
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}


// ── Daily seed keyed to Eastern midnight ──
// Returns an integer like 20260402 representing today's date in ET.
// All users on the same calendar day (ET) produce the same seed.
function getDailyEasternSeed() {
  const etDate = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/New_York',
    year: 'numeric', month: '2-digit', day: '2-digit'
  }).format(new Date());
  // etDate format: "MM/DD/YYYY"
  const [month, day, year] = etDate.split('/');
  return parseInt(`${year}${month}${day}`, 10);
}

// ── Tiered city pools ──
// Non-USA cities are tiered by index position (mirrors practice mode difficulty):
//   index 0-4   → easyWorld
//   index 5-9   → medium
//   index 10-14 → hard
//   index 15-19 → veryHard
// All USA cities → easyUSA
// Challenge order: easyUSA, easyWorld, medium, hard, veryHard
// 14-day cooldown: a city cannot be selected within 14 days of its last appearance.
const countryLabels = {
  france: 'France', germany: 'Germany', russia: 'Russia',
  japan: 'Japan', canada: 'Canada', india: 'India', usa: 'USA', china: 'China',
  british_isles: 'British Isles', oceania: 'Australia & NZ',
};

function buildTieredPools() {
  const pools = { easyUSA: [], easyWorld: [], medium: [], hard: [], veryHard: [] };
  ['france','germany','russia','japan','canada','india','china','british_isles','oceania'].forEach(country => {
    allCities[country].forEach((city, idx) => {
      const tier = idx < 5 ? 'easyWorld' : idx < 10 ? 'medium' : idx < 15 ? 'hard' : 'veryHard';
      pools[tier].push({ name: city.name, country: city.country || countryLabels[country], lat: city.lat, lng: city.lng });
    });
  });
  allCities.usa.forEach(city => {
    pools.easyUSA.push({ name: city.name, country: 'USA', state: city.state, lat: city.lat, lng: city.lng });
  });
  return pools;
}

// Returns a YYYYMMDD seed integer offset by the given number of days.
function getDaySeed(todaySeed, offset) {
  const year = Math.floor(todaySeed / 10000);
  const month = Math.floor((todaySeed % 10000) / 100) - 1; // 0-indexed for Date()
  const day = todaySeed % 100;
  const d = new Date(year, month, day + offset);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return parseInt(`${y}${m}${dd}`, 10);
}

function selectChallengeCities() {
  const COOLDOWN = 14;
  const todaySeed = getDailyEasternSeed();
  const pools = buildTieredPools();
  const tiers = ['easyUSA', 'easyWorld', 'medium', 'hard', 'veryHard'];

  function pickForSeed(daySeed, excluded) {
    const rng = mulberry32(daySeed);
    const used = new Set(excluded);
    const countryCounts = {};
    return tiers.map(tier => {
      const candidates = pools[tier].filter(c =>
        !used.has(c.name) && (countryCounts[c.country] || 0) < 2
      );
      const city = candidates[Math.floor(rng() * candidates.length)];
      used.add(city.name);
      countryCounts[city.country] = (countryCounts[city.country] || 0) + 1;
      return city;
    });
  }

  // Simulate 2×COOLDOWN-1 days of history (warmup ensures the 13 days we
  // actually exclude have each had their own full context when computed).
  const history = []; // chronological arrays of city names, oldest first
  for (let offset = -(COOLDOWN * 2 - 1); offset < 0; offset++) {
    const excluded = new Set();
    history.slice(-(COOLDOWN - 1)).forEach(names => names.forEach(n => excluded.add(n)));
    const cities = pickForSeed(getDaySeed(todaySeed, offset), excluded);
    history.push(cities.map(c => c.name));
  }

  // Today: exclude every city seen in the last COOLDOWN-1 days.
  const todayExcluded = new Set();
  history.slice(-(COOLDOWN - 1)).forEach(names => names.forEach(n => todayExcluded.add(n)));

  return pickForSeed(todaySeed, todayExcluded);
}

// ── Map ──
const map = L.map('map', { center: [20, 0], zoom: 2, zoomControl: true });
L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { attribution: 'Tiles &copy; Esri', maxZoom: 19, detectRetina: true }
).addTo(map);

// ── Icon factory ──
function makeAnswerIcon() {
  return L.divIcon({
    className: '',
    html: `<div class="star-wrap s-answer">&#9733;</div>`,
    iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -18],
  });
}

// ── Quiz state ──
const challengeCities  = selectChallengeCities();
let quizIndex          = 0;
let quizTotalDist      = 0;
let quizBestCity       = null; // { name, dist }
let quizWorstCity      = null; // { name, dist }
let quizCityScores     = [];   // numeric scores in play order
let quizAnswered       = false;
let quizGuessMarker    = null;
let quizAnswerMarker   = null;
let quizLine           = null;
let quizPendingMarker  = null;
let quizDistLabel      = null;
let distLabelHandler   = null;
let quizPendingCoords  = null;

function clearPending() {
  if (quizPendingMarker) { map.removeLayer(quizPendingMarker); quizPendingMarker = null; }
  quizPendingCoords = null;
  document.getElementById('confirm-banner').style.display   = 'none';
  document.getElementById('feedback-overlay').style.display = 'none';
}

function clearQuizOverlays() {
  clearPending();
  if (quizGuessMarker)  { map.removeLayer(quizGuessMarker);  quizGuessMarker  = null; }
  if (quizAnswerMarker) { map.removeLayer(quizAnswerMarker); quizAnswerMarker = null; }
  if (quizLine)         { map.removeLayer(quizLine);         quizLine         = null; }
  if (distLabelHandler) { map.off('moveend', distLabelHandler); distLabelHandler = null; }
  if (quizDistLabel)    { map.removeLayer(quizDistLabel);    quizDistLabel    = null; }
}

function showQuizQuestion() {
  quizAnswered = false;
  clearQuizOverlays();
  map.closePopup();

  const city = challengeCities[quizIndex];
  document.getElementById('city-prompt').textContent = city.state
    ? `${city.name}, ${city.state}, ${city.country}`
    : `${city.name}, ${city.country}`;
  document.getElementById('q-num').textContent       = quizIndex + 1;
  document.getElementById('q-total').textContent     = challengeCities.length;
  document.getElementById('feedback-banner').style.display  = 'none';
  document.getElementById('feedback-overlay').style.display = 'none';
  document.getElementById('feedback-grade').textContent = '';
  document.getElementById('feedback-grade').className   = '';

  const nextBtn = document.getElementById('next-btn');
  nextBtn.textContent = quizIndex + 1 < challengeCities.length ? 'Next →' : 'Finish';
}

function showPendingGuess(lat, lng) {
  if (quizPendingMarker) map.removeLayer(quizPendingMarker);
  quizPendingCoords = { lat, lng };
  quizPendingMarker = L.circleMarker([lat, lng], {
    radius: 10, color: '#fff', fillColor: '#60b4ff', fillOpacity: 0.85, weight: 2.5
  }).addTo(map);
  document.getElementById('confirm-banner').style.display = 'block';
}

function handleQuizClick(guessLat, guessLng) {
  if (quizAnswered) return;
  quizAnswered = true;

  if (quizPendingMarker) { map.removeLayer(quizPendingMarker); quizPendingMarker = null; }
  document.getElementById('confirm-banner').style.display = 'none';

  const city = challengeCities[quizIndex];
  const dist = haversineMiles(guessLat, guessLng, city.lat, city.lng);
  quizTotalDist += dist;
  if (!quizBestCity  || dist < quizBestCity.dist)  quizBestCity  = { name: city.name, dist };
  if (!quizWorstCity || dist > quizWorstCity.dist) quizWorstCity = { name: city.name, dist };
  quizCityScores.push(distScore(dist));

  // Normalize to the map copy closest to the city so visuals don't wrap the long way
  let normGuessLng = guessLng;
  while (normGuessLng - city.lng > 180) normGuessLng -= 360;
  while (normGuessLng - city.lng < -180) normGuessLng += 360;

  quizAnswerMarker = L.marker([city.lat, city.lng], { icon: makeAnswerIcon() }).addTo(map);
  quizAnswerMarker
    .bindPopup(`<div style="padding:2px 10px">${city.name}, ${city.country}</div>`, { closeButton: false, autoClose: false })
    .openPopup();

  quizLine = L.polyline([[guessLat, normGuessLng], [city.lat, city.lng]], {
    color: '#aaa', weight: 1.5, dashArray: '6,5', opacity: 0.6
  }).addTo(map);

  // Guess location — red dot, same size as the answer star
  quizGuessMarker = L.marker([guessLat, normGuessLng], { icon: L.divIcon({
    className: '',
    html: '<div style="width:28px;height:28px;border-radius:50%;background:rgba(255,107,107,0.85);border:2px solid #ff6b6b;box-sizing:border-box;"></div>',
    iconSize: [28, 28], iconAnchor: [14, 14],
  }) }).addTo(map);

  // Place distance label (immediately if top grade, else after zoom settles)
  const distText = dist < 10 ? dist.toFixed(1) : Math.round(dist);
  const isTopGrade = dist < 40; // A+ only — no zoom
  const placeDistLabel = () => {
    distLabelHandler = null;
    const pA = map.latLngToContainerPoint([guessLat, normGuessLng]);
    const pB = map.latLngToContainerPoint([city.lat, city.lng]);
    const mx = (pA.x + pB.x) / 2, my = (pA.y + pB.y) / 2;
    const dx = pB.x - pA.x, dy = pB.y - pA.y;
    const len = Math.sqrt(dx * dx + dy * dy);
    const DODGE = 42;
    let ox = len > 0 ? (-dy / len) * DODGE : DODGE;
    let oy = len > 0 ? (dx / len) * DODGE : 0;
    if (oy > 0) { ox = -ox; oy = -oy; }
    const dodgedLatLng = map.containerPointToLatLng(L.point(mx + ox, my + oy));
    quizDistLabel = L.marker(dodgedLatLng, {
      icon: L.divIcon({
        className: 'quiz-dist-label',
        html: `<div style="background:rgba(0,0,0,0.65);color:#fff;font-size:11px;line-height:1.4;padding:4px 9px;border-radius:6px;white-space:nowrap;text-align:center;">Distance:<br>${distText} mi</div>`,
        iconSize: null,
        iconAnchor: [39, 20],
      })
    }).addTo(map);
  };
  requestAnimationFrame(() => {
    if (isTopGrade) {
      placeDistLabel();
    } else {
      const revealContainer = map.getContainer();
      map.flyToBounds(
        L.latLngBounds([guessLat, normGuessLng], [city.lat, city.lng]),
        { padding: [revealContainer.offsetWidth / 6, revealContainer.offsetHeight / 6], maxZoom: 12 }
      );
      distLabelHandler = placeDistLabel;
      map.once('moveend', distLabelHandler);
    }
  });

  const distDisplay = dist < 10 ? dist.toFixed(1) : Math.round(dist);
  const pts = distScore(dist);
  const banner = document.getElementById('feedback-banner');
  banner.className = 'inspect-mode';
  document.getElementById('feedback-result').textContent = city.state
    ? `${city.name}, ${city.state}, ${city.country}`
    : `${city.name}, ${city.country}`;
  const gradeEl = document.getElementById('feedback-grade');
  gradeEl.textContent = pts;
  gradeEl.className   = scoreClass(pts);
  document.getElementById('feedback-detail').textContent = `${distDisplay} miles off`;
  banner.style.display = 'flex';
}

// ── Daily challenge completion persistence ──
function getTodayKey() {
  return 'atlasquest_challenge_' + getDailyEasternSeed();
}
function saveChallenge() {
  localStorage.setItem(getTodayKey(), JSON.stringify({
    scores:    quizCityScores,
    bestCity:  quizBestCity,
    worstCity: quizWorstCity,
    totalDist: quizTotalDist,
    cityCount: challengeCities.length,
  }));
}
function loadTodayResult() {
  try {
    const raw = localStorage.getItem(getTodayKey());
    return raw ? JSON.parse(raw) : null;
  } catch (_) { return null; }
}

function showEndScreen(fromStorage = false) {
  document.getElementById('feedback-banner').style.display  = 'none';
  document.getElementById('feedback-overlay').style.display = 'none';
  clearQuizOverlays();

  if (!fromStorage) saveChallenge();

  const avg      = quizTotalDist / challengeCities.length;
  const avgScore = quizCityScores.length
    ? Math.round(quizCityScores.reduce((a, b) => a + b, 0) / quizCityScores.length)
    : distScore(avg);

  document.getElementById('end-grade').textContent  = avgScore;
  document.getElementById('end-grade').className    = scoreClass(avgScore);
  document.getElementById('end-dist').textContent   = `${Math.round(avg)} mi average · ${challengeCities.length} cities`;
  document.getElementById('end-message').textContent =
    avgScore >= 98 ? 'Incredible — you know the world!' :
    avgScore >= 90 ? 'Great geography skills!' :
    avgScore >= 75 ? 'Not bad — keep exploring!' : 'Keep practicing!';

  document.getElementById('end-screen').style.display = 'flex';
  document.getElementById('end-screen').scrollTop = 0;
}

// ── Event listeners ──
document.getElementById('next-btn').addEventListener('click', () => {
  document.getElementById('feedback-banner').classList.remove('inspect-mode');
  quizIndex++;
  if (quizIndex >= challengeCities.length) showEndScreen();
  else showQuizQuestion();
});

// inspect-btn removed — feedback always starts in inspect-mode

document.getElementById('confirm-yes-btn').addEventListener('click', () => {
  if (!quizPendingCoords) return;
  const { lat, lng } = quizPendingCoords;
  quizPendingCoords = null;
  handleQuizClick(lat, lng);
});

document.getElementById('confirm-back-btn').addEventListener('click', clearPending);

document.getElementById('share-btn').addEventListener('click', async () => {
  const score  = parseInt(document.getElementById('end-grade').textContent, 10);
  const distEl = document.getElementById('end-dist').textContent; // "78 mi average · 5 cities"
  const miAvg  = distEl.split(' mi')[0];

  const scoreEmoji = score >= 97 ? '🗿' : score >= 93 ? '🚀' : score >= 90 ? '🧠' : score >= 87 ? '💪' : score >= 83 ? '🤌' : score >= 80 ? '🤙' : score >= 77 ? '🥸' : score >= 73 ? '🥱' : score >= 70 ? '🥴' : score >= 67 ? '👹' : score >= 63 ? '💩' : score >= 60 ? '🤡' : '💀';

  const citySquare = s => {
    if (s >= 90) return '✅';
    if (s >= 70) return '🟩';
    if (s >= 50) return '🟨';
    if (s >= 30) return '🟧';
    return '🟥';
  };
  const squares = quizCityScores.map(citySquare).join('');

  const etParts = new Intl.DateTimeFormat('en-US', { timeZone: 'America/New_York', month: 'short', day: 'numeric' }).formatToParts(new Date());
  const etMonthShort = etParts.find(p => p.type === 'month').value;
  const etMonth = etMonthShort === 'Apr' ? 'April' : etMonthShort;
  const etDay   = etParts.find(p => p.type === 'day').value;
  const etDate  = `${etMonth} ${etDay}`;

  const text = `AtlasQuest.io - ${etDate}\nScore: ${score} ${scoreEmoji}\n${squares}`;
  const url    = 'https://atlasquest.io/challenge.html';

  if (navigator.share) {
    try {
      await navigator.share({ text });
    } catch (_) { /* user cancelled */ }
    return;
  }

  // Fallback: copy to clipboard
  const info = document.getElementById('share-info');
  try {
    await navigator.clipboard.writeText(text);
    info.textContent  = 'Link copied to clipboard!';
    info.style.display = 'block';
  } catch (_) {
    // Last resort: show text for manual copy
    info.textContent  = text;
    info.style.display = 'block';
  }
});

map.on('click', function(e) {
  if (quizAnswered) return;
  showPendingGuess(e.latlng.lat, e.latlng.lng);
});

// ── Start ──
const _todayResult = loadTodayResult();
if (_todayResult) {
  quizCityScores = _todayResult.scores || [];
  quizBestCity   = _todayResult.bestCity;
  quizWorstCity  = _todayResult.worstCity;
  quizTotalDist  = _todayResult.totalDist;
  showEndScreen(true);
} else {
  showQuizQuestion();
}
</script>
